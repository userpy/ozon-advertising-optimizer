x-airflow-common: &airflow-common
  build: .
  env_file:
    - .env
  environment:
    DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
    AIRFLOW_CONN_POSTGRES_DEFAULT: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./db:/opt/airflow/db
    - ./services:/opt/airflow/services
    - ./scripts:/opt/airflow/scripts
    - ./tests:/opt/airflow/tests
    - ./alembic:/opt/airflow/alembic
    - ./alembic.ini:/opt/airflow/alembic.ini
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        chown -R "$${AIRFLOW_UID}:0" /opt/airflow/logs
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" || true
        airflow connections delete postgres_default || true
        airflow connections add postgres_default \
          --conn-uri "$${AIRFLOW_CONN_POSTGRES_DEFAULT}"
    depends_on:
      <<: *airflow-common-depends-on

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_HOST_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  airflow-logs:
